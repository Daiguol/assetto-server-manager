name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: make test
        run: make test

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Stays on v6 (Node 20) because v7+ only supports golangci-lint v2+,
      # and we're still on v1.64.8. Bump in tandem when we migrate to
      # golangci-lint v2 (new config schema, separate phase).
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
